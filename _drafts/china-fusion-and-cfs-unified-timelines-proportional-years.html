    "body": "After first plasma, BEST is expected to move through H/D commissioning and deuterium scenario development. The goals include startup, current and position control, heating and current drive, disruption mitigation, wall conditioning, fueling, divertor control, tungsten impurity control, and diagnostics.",
    "group": "China"
  },
  {
    "id": 64,
    "year": 2030,
    "side": "left",
    "title": "Target: D-T scientific breakeven before the end of 2030",
    "links": [
      {
        "href": "https://euro-fusion.org/wp-content/uploads/2025/11/BEST-Research-Plan-v1.1.pdf",
        "text": "BEST Research Plan PDF"
      },
      {
        "href": "https://en.people.cn/n3/2026/0117/c90000-20415588.html",
        "text": "2030 power-generation reporting"
      }
    ],
    "body": "The tight technical target is Q \u2265 1 D-T operation before the end of 2030. Chinese official media also describe an around-2030 goal to demonstrate net fusion power gain and fusion-based electricity generation; that language should be treated as an aspirational project target until the detailed electrical-system scope is public.",
    "group": "China",
    "dateLabel": "By end-2030"
  },
  {
    "year": 2030,
    "dateLabel": "Early 2030s",
    "side": "right",
    "title": "ARC intended to follow SPARC",
    "links": [
      {
        "href": "https://cfs.energy/technology/sparc/",
        "text": "CFS SPARC page"
      },
      {
        "href": "https://www.reuters.com/business/energy/commonwealth-plans-worlds-first-grid-scale-fusion-power-plant-virginia-2024-12-17/",
        "text": "Reuters ARC site report"
      }
    ],
    "body": "CFS continues to describe SPARC as the proving machine for ARC, with ARC expected to put power on the grid in the early 2030s. That makes SPARC the company\u2019s equivalent of a near-term, high-field D-T proof step before the first commercial plant.",
    "group": "CFS ARC",
    "id": 65
  },
  {
    "id": 66,
    "year": 2035,
    "side": "left",
    "title": "Long-pulse and higher-Q burning-plasma campaigns feed CFEDR",
    "links": [
      {
        "href": "https://euro-fusion.org/wp-content/uploads/2025/11/BEST-Research-Plan-v1.1.pdf",
        "text": "BEST Research Plan PDF"
      },
      {
        "href": "https://indico.euro-fusion.org/event/3045/contributions/11876/attachments/5506/9655/CFETR-Eurofusion%20Workshop_20240203%28VC%29.pdf",
        "text": "CFEDR gap-filling presentation"
      }
    ],
    "body": "The 2030\u20132035 program is where BEST is expected to move from initial breakeven toward long-pulse fusion-technology work, alpha-particle physics, and advanced scenarios approaching Q \u2248 5. The strategic purpose is to reduce CFEDR risk before China commits the larger engineering-demonstration machine.",
    "group": "China",
    "dateLabel": "2030\u20132035"
  }
]
  </script>

  <script>
  (function () {
    const BREAKPOINT = 860;
    const controllers = new Map();
    let d3Promise = null;

    const broadEras = [
      { id: "foundations", start: 1956, end: 1978, label: "Era 1", title: "Foundations and first machines", dek: "Fusion enters China's long-range science planning, early pinch and mirror devices appear, and the first dedicated fusion institutions take shape.", open: false },
      { id: "consolidation", start: 1980, end: 1998, label: "Era 2", title: "Tokamak consolidation and laser-fusion buildout", dek: "China builds the HL and HT tokamak lines, develops the Shenguang laser-fusion program, and turns superconducting tokamaks into national infrastructure.", open: false },
      { id: "iter-era", start: 2002, end: 2013, label: "Era 3", title: "ITER as an accelerant", dek: "ITER participation helps convert fusion from a physics program into a coordinated national technology program with magnets, heating, blankets, tritium, controls, and diagnostics on the agenda.", open: false },
      { id: "engineering-scale-up", start: 2014, end: 2021, label: "Era 4", title: "Engineering test platforms and route diversification", dek: "CFETR, CRAFT, SG-III, advanced tokamak work, FRCs, RFPs, stellarators, and dual-carbon policy broaden the program beyond one experimental line.", open: false },
      { id: "future-industry", start: 2022, end: 2029, label: "Era 5", title: "Commercialization, regulation, and future industry", dek: "Fusion moves into future-industry policy, formal regulation, private-company hardware programs, and the next wave of high-field and burning-plasma machines.", open: false }
    ];

    function loadD3() {
      if (window.d3) return Promise.resolve(window.d3);
      if (d3Promise) return d3Promise;

      d3Promise = new Promise(function (resolve, reject) {
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/d3@7";
        script.onload = function () { resolve(window.d3); };
        script.onerror = reject;
        document.head.appendChild(script);
      });

      return d3Promise;
    }

    function readData(id) {
      const node = document.getElementById(id);
      if (!node) return [];
      return JSON.parse(node.textContent);
    }

    function formatYear(year) {
      return Number.isInteger(year) ? String(year) : year.toFixed(1);
    }

    function sortValue(item) {
      const year = Number(item.year) || 0;
      const label = String(item.dateLabel || "");
      const months = {
        January: 0, February: 1, March: 2, April: 3, May: 4, June: 5,
        July: 6, August: 7, September: 8, October: 9, November: 10, December: 11
      };
      const exact = label.match(/^(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{1,2}),\s+(\d{4})$/);
      if (exact) return year + (months[exact[1]] + ((Number(exact[2]) - 1) / 31)) / 12;
      const monthOnly = label.match(/^(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{4})$/);
      if (monthOnly) return year + (months[monthOnly[1]] + 0.5) / 12;
      if (/^Early\s+\d{4}$/.test(label)) return year + 0.15;
      if (/^Mid\s+\d{4}$/.test(label)) return year + 0.5;
      if (/^Late\s+\d{4}$/.test(label)) return year + 0.85;
      if (/By end-\d{4}$/.test(label)) return year + 0.92;
      return year;
    }

    function eraItems(data, era) {
      return data
        .filter(function (item) { return item.year >= era.start && item.year <= era.end; })
        .sort(function (a, b) { return (sortValue(a) - sortValue(b)) || (a.id - b.id); });
    }

    function buildEraShell(shell, data, eras, idPrefix) {
      shell.innerHTML = "";

      eras.forEach(function (era) {
        const items = eraItems(data, era);
        const details = document.createElement("details");
        details.className = "cf-era";
        details.dataset.eraId = era.id;
        if (era.open) details.open = true;

        const summary = document.createElement("summary");
        summary.className = "cf-era__summary";

        const main = document.createElement("div");
        main.className = "cf-era__summary-main";

        const label = document.createElement("span");
        label.className = "cf-era__label";
        label.textContent = era.label;
        main.appendChild(label);

        const title = document.createElement("h3");
        title.className = "cf-era__title";
        title.textContent = era.title;
        main.appendChild(title);

        const dek = document.createElement("p");
        dek.className = "cf-era__dek";
        dek.textContent = era.dek;
        main.appendChild(dek);

        const meta = document.createElement("div");
        meta.className = "cf-era__meta";

        const icon = document.createElement("span");
        icon.className = "cf-era__icon";
        icon.setAttribute("aria-hidden", "true");
        meta.appendChild(icon);

        summary.appendChild(main);
        summary.appendChild(meta);

        const body = document.createElement("div");
        body.className = "cf-era__body";

        const timeline = document.createElement("div");
        timeline.className = "cf-timeline";
        timeline.id = idPrefix + "-" + era.id;
        timeline.innerHTML = '<div class="cf-timeline__loading">Open this section to load the timeline.</div>';
        body.appendChild(timeline);

        details.appendChild(summary);
        details.appendChild(body);
        shell.appendChild(details);

        details.addEventListener("toggle", function () {
          if (details.open) {
            renderWhenReady(timeline, items, era.start, era.end, { comparison: false });
          } else {
            requestAnimationFrame(function () {
              const y = details.getBoundingClientRect().top + window.pageYOffset - 12;
              window.scrollTo({ top: Math.max(0, y), behavior: "auto" });
            });
          }
        });

        if (details.open) renderWhenReady(timeline, items, era.start, era.end, { comparison: false });
      });
    }

    function buildSingleComparison(shell, data) {
      shell.innerHTML = "";

      const intro = document.createElement("section");
      intro.className = "cf-timeline-intro";

      const label = document.createElement("span");
      label.className = "cf-era__label";
      label.textContent = "Focused comparison";
      intro.appendChild(label);

      const title = document.createElement("h2");
      title.textContent = "CFETR, CRAFT, BEST, and CFS SPARC";
      intro.appendChild(title);

      const dek = document.createElement("p");
      dek.textContent = "China entries appear on the left; CFS and SPARC entries appear on the right. This is one continuous comparison timeline, so the design, construction, assembly, and planned D-T proof steps can be read in one sequence.";
      intro.appendChild(dek);

      const timeline = document.createElement("div");
      timeline.className = "cf-timeline cf-timeline--comparison";
      timeline.id = "china-cfetr-craft-best-timeline-d3-unified";
      timeline.innerHTML = '<div class="cf-timeline__loading">Loading timeline...</div>';

      shell.appendChild(intro);
      shell.appendChild(timeline);

      const sorted = data.slice().sort(function (a, b) {
        return (sortValue(a) - sortValue(b)) || (a.id - b.id);
      });
      renderWhenReady(timeline, sorted, 2011, 2035, { comparison: true });
    }

    function renderWhenReady(root, items, startYear, endYear, options) {
      const existing = controllers.get(root);
      if (existing) {
        requestAnimationFrame(existing.layout);
        return;
      }

      root.innerHTML = '<div class="cf-timeline__loading">Loading timeline...</div>';

      loadD3()
        .then(function (d3) {
          if (!items.length) {
            root.innerHTML = '<div class="cf-timeline__empty">No entries are assigned to this timeline.</div>';
            return;
          }
          const controller = renderTimeline(d3, root, items, startYear, endYear, options || {});
          controllers.set(root, controller);
        })
        .catch(function () {
          root.innerHTML = '<div class="cf-timeline__error">The interactive D3 timeline could not load because the D3 script failed to download.</div>';
        });
    }

    function tickStep(startYear, endYear) {
      const span = endYear - startYear;
      if (span <= 8) return 1;
      if (span <= 15) return 2;
      if (span <= 30) return 5;
      return 10;
    }

    function timelineTicks(d3, startYear, endYear) {
      const step = tickStep(startYear, endYear);
      const first = Math.ceil(startYear / step) * step;
      const ticks = d3.range(first, endYear + 0.0001, step);
      ticks.push(startYear, endYear);
      return Array.from(new Set(ticks))
        .filter(function (tick) { return tick >= startYear && tick <= endYear; })
        .sort(function (a, b) { return a - b; });
    }

    function renderTimeline(d3, root, sourceItems, startYear, endYear, options) {
      root.innerHTML = "";

      const timelineData = sourceItems.map(function (item) {
        return Object.assign({}, item, { links: item.links ? item.links.slice() : [] });
      }).sort(function (a, b) {
        return (sortValue(a) - sortValue(b)) || (a.id - b.id);
      });

      const svg = d3.select(root)
        .append("svg")
        .attr("class", "cf-timeline__svg")
        .attr("aria-hidden", "true");

      const cardsLayer = d3.select(root)
        .append("div")
        .attr("class", "cf-timeline__cards");

      const events = cardsLayer.selectAll("article")
        .data(timelineData, function (d) { return d.id; })
        .join("article")
        .attr("class", "cf-timeline__event");

      events.each(function (d) {
        const article = d3.select(this);
        article.html("");

        const card = article.append("div").attr("class", "cf-timeline__card");
        const meta = card.append("div").attr("class", "cf-timeline__meta");

        meta.append("span")
          .attr("class", "cf-timeline__tag")
          .text(d.group);

        meta.append("span")
          .attr("class", "cf-timeline__date")
          .text(d.dateLabel || formatYear(d.year));

        const heading = card.append("h3");
        if (d.links && d.links.length) {
          heading.append("a")
            .attr("href", d.links[0].href)
            .attr("target", "_blank")
            .attr("rel", "noreferrer noopener")
            .text(d.title);
        } else {
          heading.text(d.title);
        }

        if (d.links && d.links.length > 1) {
          const links = card.append("div").attr("class", "cf-timeline__links");
          d.links.slice(1).forEach(function (link) {
            links.append("a")
              .attr("href", link.href)
              .attr("target", "_blank")
              .attr("rel", "noreferrer noopener")
              .text(link.text);
          });
        }

        card.append("p").text(d.body);
      });

      function laneItems(singleColumn) {
        if (singleColumn) {
          return [timelineData.slice().sort(function (a, b) {
            return (sortValue(a) - sortValue(b)) || (a.id - b.id);
          })];
        }

        return ["left", "right"].map(function (side) {
          return timelineData
            .filter(function (d) { return d.side === side; })
            .sort(function (a, b) {
              return (sortValue(a) - sortValue(b)) || (a.id - b.id);
            });
        });
      }

      function layout() {
        const width = root.clientWidth || 980;
        const singleColumn = width < BREAKPOINT;

        const narrowMobile = singleColumn && width < 360;
        const connectorGap = singleColumn
          ? (narrowMobile ? 26 : 34)
          : (options.comparison ? 46 : 64);
        const axisX = singleColumn ? (narrowMobile ? 42 : 52) : width / 2;
        const desktopCardWidth = Math.min(
          options.comparison ? 460 : 420,
          Math.max(260, (width / 2) - connectorGap - (options.comparison ? 20 : 32))
        );
        const mobileCardWidth = Math.max(160, width - axisX - connectorGap - 8);
        const cardWidth = singleColumn ? mobileCardWidth : desktopCardWidth;
        const packGap = options.comparison ? (singleColumn ? 12 : 12) : (singleColumn ? 16 : 18);
        const minPixelsPerYear = options.comparison ? (singleColumn ? 10 : 8) : (singleColumn ? 12 : 10);

        events
          .classed("is-single", singleColumn)
          .classed("is-left", function (d) { return !singleColumn && d.side === "left"; })
          .classed("is-right", function (d) { return singleColumn || d.side === "right"; })
          .style("width", cardWidth + "px")
          .style("left", function (d) {
            if (singleColumn) {
              d.x = axisX + connectorGap;
            } else if (d.side === "left") {
              d.x = (width / 2) - connectorGap - cardWidth;
            } else {
              d.x = (width / 2) + connectorGap;
            }
            return d.x + "px";
          })
          .style("transform", "translateY(0px)");

        events.each(function (d) {
          d.cardHeight = Math.ceil(this.getBoundingClientRect().height);
        });

        function itemYear(item) {
          return Number.isFinite(Number(item.year)) ? Number(item.year) : Math.floor(sortValue(item));
        }

        function groupByDisplayYear(items) {
          const groups = [];
          let current = null;

          items.forEach(function (item) {
            const year = itemYear(item);
            if (!current || current.year !== year) {
              current = { year: year, items: [], height: 0, halfHeight: 0 };
              groups.push(current);
            }
            current.items.push(item);
          });

          groups.forEach(function (group) {
            group.height = group.items.reduce(function (sum, item) {
              return sum + (item.cardHeight || 0);
            }, 0) + Math.max(0, group.items.length - 1) * packGap;
            group.halfHeight = group.height / 2;
          });

          return groups;
        }

        const groupedLanes = laneItems(singleColumn).map(groupByDisplayYear);
        const allGroups = groupedLanes.reduce(function (flat, groups) {
          return flat.concat(groups);
        }, []);
        const maxCardHeight = d3.max(timelineData, function (d) { return d.cardHeight || 0; }) || 0;
        const maxCardHalf = Math.ceil(maxCardHeight / 2);

        let pixelsPerYear = minPixelsPerYear;
        groupedLanes.forEach(function (groups) {
          for (let i = 1; i < groups.length; i += 1) {
            const prev = groups[i - 1];
            const curr = groups[i];
            const deltaYears = curr.year - prev.year;
            if (deltaYears > 0) {
              const needed = (prev.halfHeight + curr.halfHeight + packGap) / deltaYears;
              pixelsPerYear = Math.max(pixelsPerYear, needed);
            }
          }
        });

        const baseTopPad = options.comparison
          ? (singleColumn ? 48 : 44)
          : (singleColumn ? 72 : 66);
        const baseBottomPad = options.comparison
          ? (singleColumn ? 44 : 40)
          : (singleColumn ? 60 : 52);
        const topClearance = options.comparison
          ? (singleColumn ? 18 : 16)
          : (singleColumn ? 28 : 24);

        let minRelativeTop = 0;
        allGroups.forEach(function (group) {
          const center = (group.year - startYear) * pixelsPerYear;
          minRelativeTop = Math.min(minRelativeTop, center - group.halfHeight);
        });

        const topPad = Math.max(
          baseTopPad,
          maxCardHalf + (options.comparison ? 10 : (singleColumn ? 26 : 22)),
          topClearance - minRelativeTop
        );
        const bottomPad = Math.max(baseBottomPad, maxCardHalf + (options.comparison ? 10 : 20));

        const rawScale = d3.scaleLinear()
          .domain([startYear, endYear])
          .range([topPad, topPad + (endYear - startYear) * pixelsPerYear]);

        let maxBottom = rawScale(endYear);

        groupedLanes.forEach(function (groups) {
          groups.forEach(function (group) {
            let cursor = rawScale(group.year) - group.halfHeight;

            group.items.forEach(function (item) {
              item.top = cursor;
              item.y = cursor + (item.cardHeight / 2);
              item.bottom = cursor + item.cardHeight;
              cursor = item.bottom + packGap;
              maxBottom = Math.max(maxBottom, item.bottom);
            });
          });
        });

        const height = Math.ceil(maxBottom + bottomPad);
        const axisBottom = rawScale(endYear);
        root.style.height = height + "px";
        cardsLayer.style("height", height + "px");

        events.style("transform", function (d) {
          return "translateY(" + Math.round(d.top) + "px)";
        });

        const ticks = timelineTicks(d3, startYear, endYear);

        svg
          .attr("width", width)
          .attr("height", height)
          .attr("viewBox", "0 0 " + width + " " + height)
          .attr("preserveAspectRatio", "xMidYMin meet");

        svg.selectAll("*").remove();

        svg.append("line")
          .attr("class", "cf-timeline__axis")
          .attr("x1", axisX)
          .attr("x2", axisX)
          .attr("y1", topPad)
          .attr("y2", axisBottom);

        svg.selectAll(".cf-timeline__connector")
          .data(timelineData, function (d) { return d.id; })
          .join("line")
          .attr("class", "cf-timeline__connector")
          .attr("x1", axisX)
          .attr("x2", function (d) {
            if (singleColumn || d.side === "right") {
              return d.x;
            }
            return d.x + cardWidth;
          })
          .attr("y1", function (d) { return d.y; })
          .attr("y2", function (d) { return d.y; });

        svg.selectAll(".cf-timeline__event-dot")
          .data(timelineData, function (d) { return d.id; })
          .join("circle")
          .attr("class", "cf-timeline__event-dot")
          .attr("cx", axisX)
          .attr("cy", function (d) { return d.y; })
          .attr("r", 4);

        const tickGroups = svg.selectAll(".cf-timeline__tick")
          .data(ticks)
          .join("g")
          .attr("class", "cf-timeline__tick")
          .attr("transform", function (d) {
            return "translate(" + axisX + "," + rawScale(d) + ")";
          });

        tickGroups.append("circle")
          .attr("class", "cf-timeline__tick-circle")
          .attr("r", 6);

        tickGroups.append("text")
          .attr("class", "cf-timeline__tick-label")
          .attr("x", singleColumn ? -10 : -18)
          .attr("y", 4)
          .attr("text-anchor", "end")
          .text(function (d) { return d; });
      }

      layout();

      let raf = null;
      let lastWidth = root.clientWidth || 0;
      const rerender = function () {
        const currentWidth = root.clientWidth || 0;
        if (Math.abs(currentWidth - lastWidth) < 1) return;
        lastWidth = currentWidth;

        if (raf) cancelAnimationFrame(raf);
        raf = requestAnimationFrame(layout);
      };

      if (typeof ResizeObserver !== "undefined") {
        const observer = new ResizeObserver(rerender);
        observer.observe(root);
      } else {
        window.addEventListener("resize", rerender);
      }

      return { layout: layout };
    }

    const broadShell = document.getElementById("china-fusion-timeline-d3");
    const focusedShell = document.getElementById("china-cfetr-craft-best-timeline-d3");

    if (broadShell) buildEraShell(broadShell, readData("china-fusion-timeline-d3-data"), broadEras, "china-fusion-timeline-d3");
    if (focusedShell) buildSingleComparison(focusedShell, readData("china-cfetr-craft-best-timeline-d3-data"));
  })();
  </script>
</body>
